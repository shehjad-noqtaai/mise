name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Public URLs — safe to commit; not secrets.
  SANITY_STUDIO_PREVIEW_URL: https://mise-web.shehjkhan.workers.dev
  SANITY_STUDIO_URL: https://mise-kitchen-os.sanity.studio

jobs:
  web:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Check required config
        run: |
          missing=0
          for name in SANITY_STUDIO_PROJECT_ID SANITY_STUDIO_DATASET CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions variable (Production environment): $name"
              missing=1
            fi
          done
          for name in CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret (Production environment): $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Build Astro site
        run: pnpm build
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          PUBLIC_SANITY_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_URL: ${{ env.SANITY_STUDIO_URL }}
      - name: Deploy to Cloudflare Workers
        run: pnpm exec wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set Worker secret for draft mode
        run: |
          if [ -n "$SANITY_API_READ_TOKEN" ]; then
            printf '%s' "$SANITY_API_READ_TOKEN" | pnpm exec wrangler secret put SANITY_API_READ_TOKEN
          else
            echo "Skipping SANITY_API_READ_TOKEN (optional secret not configured)"
          fi
        env:
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

  studio:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4
      - name: Check required config
        run: |
          missing=0
          for name in SANITY_STUDIO_PROJECT_ID SANITY_STUDIO_DATASET; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions variable (Production environment): $name"
              missing=1
            fi
          done
          for name in SANITY_AUTH_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret (Production environment): $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Deploy Sanity Studio
        run: pnpm exec sanity deploy
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_PREVIEW_URL: ${{ env.SANITY_STUDIO_PREVIEW_URL }}
          SANITY_STUDIO_URL: ${{ env.SANITY_STUDIO_URL }}
