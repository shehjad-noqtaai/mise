name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      web_target:
        description: Web worker(s) to deploy (manual runs only)
        type: choice
        options:
          - production
          - dev
          - both
        default: both

env:
  WEB_DEV_WORKER_NAME: mise-web-dev

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      studio: ${{ steps.filter.outputs.studio }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/design-tokens/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/deploy.yml'
            studio:
              - 'apps/studio/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - '.github/workflows/deploy.yml'

  web:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && (inputs.web_target == 'production' || inputs.web_target == 'both'))
      )
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Check required config
        run: |
          missing=0
          for name in SANITY_STUDIO_PROJECT_ID SANITY_STUDIO_DATASET SANITY_STUDIO_HOSTNAME CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions variable (Production environment): $name"
              missing=1
            fi
          done
          for name in CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret (Production environment): $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_HOSTNAME: ${{ vars.SANITY_STUDIO_HOSTNAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Build Astro site
        run: pnpm build
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          PUBLIC_SANITY_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_URL: ${{ vars.SANITY_STUDIO_URL || format('https://{0}.sanity.studio', vars.SANITY_STUDIO_HOSTNAME) }}
      - name: Verify Cloudflare credentials
        run: pnpm exec wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Workers (production)
        run: pnpm exec wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set Worker secret for draft mode
        run: |
          if [ -n "$SANITY_API_READ_TOKEN" ]; then
            printf '%s' "$SANITY_API_READ_TOKEN" | pnpm exec wrangler secret put SANITY_API_READ_TOKEN --config dist/server/wrangler.json
          else
            echo "Skipping SANITY_API_READ_TOKEN (optional secret not configured)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

  web-dev:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
        (github.event_name == 'workflow_dispatch' && (inputs.web_target == 'dev' || inputs.web_target == 'both'))
      )
    runs-on: ubuntu-latest
    environment: Development
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Check required config
        run: |
          missing=0
          for name in SANITY_STUDIO_PROJECT_ID SANITY_STUDIO_DATASET SANITY_STUDIO_HOSTNAME CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions variable (Development environment): $name"
              missing=1
            fi
          done
          for name in CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret (Development environment): $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_HOSTNAME: ${{ vars.SANITY_STUDIO_HOSTNAME }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Build Astro site
        run: pnpm build
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          PUBLIC_SANITY_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_URL: ${{ vars.SANITY_STUDIO_URL || format('https://{0}.sanity.studio', vars.SANITY_STUDIO_HOSTNAME) }}
      - name: Verify Cloudflare credentials
        run: pnpm exec wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Workers (dev)
        run: pnpm exec wrangler deploy --config dist/server/wrangler.json --name ${{ env.WEB_DEV_WORKER_NAME }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set Worker secret for draft mode
        run: |
          if [ -n "$SANITY_API_READ_TOKEN" ]; then
            printf '%s' "$SANITY_API_READ_TOKEN" | pnpm exec wrangler secret put SANITY_API_READ_TOKEN --config dist/server/wrangler.json --name ${{ env.WEB_DEV_WORKER_NAME }}
          else
            echo "Skipping SANITY_API_READ_TOKEN (optional secret not configured)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

  studio:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.studio == 'true') &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4
      - name: Check required config
        run: |
          missing=0
          for name in SANITY_STUDIO_PROJECT_ID SANITY_STUDIO_DATASET SANITY_STUDIO_HOSTNAME; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions variable (Production environment): $name"
              missing=1
            fi
          done
          for name in SANITY_AUTH_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions secret (Production environment): $name"
              missing=1
            fi
          done
          exit "$missing"
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_HOSTNAME: ${{ vars.SANITY_STUDIO_HOSTNAME }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Prepare Studio deploy env
        run: |
          preview="${SANITY_STUDIO_PREVIEW_URL:-https://mise-web.shehjkhan.workers.dev}"
          hostname="${SANITY_STUDIO_HOSTNAME}"
          hostname="${hostname#https://}"
          hostname="${hostname#http://}"
          hostname="${hostname%%.sanity.studio*}"
          hostname="${hostname%%/*}"
          if [ -z "$hostname" ]; then
            echo "::error::SANITY_STUDIO_HOSTNAME is empty after sanitizing (use slug only, e.g. mise-kitchen-os)"
            exit 1
          fi
          echo "STUDIO_HOSTNAME=$hostname" >> "$GITHUB_ENV"
          echo "STUDIO_PREVIEW_URL=$preview" >> "$GITHUB_ENV"
          echo "STUDIO_URL=${SANITY_STUDIO_URL:-https://${hostname}.sanity.studio}" >> "$GITHUB_ENV"
        env:
          SANITY_STUDIO_HOSTNAME: ${{ vars.SANITY_STUDIO_HOSTNAME }}
          SANITY_STUDIO_PREVIEW_URL: ${{ vars.SANITY_STUDIO_PREVIEW_URL }}
          SANITY_STUDIO_URL: ${{ vars.SANITY_STUDIO_URL }}
      - name: Deploy Sanity Studio (production)
        run: pnpm exec sanity deploy --url "$STUDIO_HOSTNAME" -y
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_STUDIO_DATASET }}
          SANITY_STUDIO_HOSTNAME: ${{ env.STUDIO_HOSTNAME }}
          SANITY_STUDIO_PREVIEW_URL: ${{ env.STUDIO_PREVIEW_URL }}
          SANITY_STUDIO_URL: ${{ env.STUDIO_URL }}
